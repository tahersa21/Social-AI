openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: Facebook AI Agent API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: providers
    description: AI provider management
  - name: ai-config
    description: AI configuration and bot persona
  - name: products
    description: Product catalog management
  - name: orders
    description: Order management
  - name: conversations
    description: Messenger conversation log
  - name: comments
    description: Facebook comment log
  - name: fb-settings
    description: Facebook page connection settings
  - name: webhook
    description: Facebook webhook endpoint
  - name: stats
    description: Dashboard analytics
  - name: appointments
    description: Appointment management
  - name: slots
    description: Available time slot management
  - name: faqs
    description: FAQ / Knowledge base
  - name: broadcasts
    description: Broadcast messages to active users
  - name: leads
    description: Lead and contact capture
  - name: subscription
    description: Subscription plans and usage
  - name: domain-templates
    description: Domain-specific bot templates
  - name: notifications
    description: Real-time SSE notifications

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ──────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  # ── Stats ─────────────────────────────────────────────────────────────────
  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get dashboard analytics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  # ── AI Providers ──────────────────────────────────────────────────────────
  /providers:
    get:
      operationId: listProviders
      tags: [providers]
      summary: List all AI providers
      responses:
        "200":
          description: List of providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Provider"
    post:
      operationId: createProvider
      tags: [providers]
      summary: Create a new AI provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProviderInput"
      responses:
        "201":
          description: Created provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Provider"

  /providers/{id}:
    put:
      operationId: updateProvider
      tags: [providers]
      summary: Update an AI provider
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProviderInput"
      responses:
        "200":
          description: Updated provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Provider"
    delete:
      operationId: deleteProvider
      tags: [providers]
      summary: Delete an AI provider
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /providers/{id}/activate:
    post:
      operationId: activateProvider
      tags: [providers]
      summary: Set a provider as the active one
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /providers/{id}/test:
    post:
      operationId: testProvider
      tags: [providers]
      summary: Test an AI provider connection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderTestResult"

  /providers/stats:
    get:
      operationId: getProviderStats
      tags: [providers]
      summary: Get provider usage stats (last 24 hours)
      responses:
        "200":
          description: Provider performance stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProviderStat"

  # ── Notifications ─────────────────────────────────────────────────────────
  /notifications/stream:
    get:
      operationId: getNotificationStream
      tags: [notifications]
      summary: SSE stream for real-time notifications (auth via token query param)
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: JWT auth token
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string

  # ── AI Config ──────────────────────────────────────────────────────────────
  /ai-config:
    get:
      operationId: getAiConfig
      tags: [ai-config]
      summary: Get AI configuration
      responses:
        "200":
          description: AI configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiConfig"
    put:
      operationId: updateAiConfig
      tags: [ai-config]
      summary: Update AI configuration (supports multipart for logo upload)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UpdateAiConfigInput"
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAiConfigInput"
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiConfig"

  # ── Products ───────────────────────────────────────────────────────────────
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product (multipart with up to 5 images)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreateProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UpdateProductInput"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /products/{id}/stock:
    patch:
      operationId: adjustProductStock
      tags: [products]
      summary: Adjust product stock quantity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockAdjustInput"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  # ── Orders ─────────────────────────────────────────────────────────────────
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders (optional status filter)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, confirmed, cancelled, delivered]
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /orders/count:
    get:
      operationId: getOrderCount
      tags: [orders]
      summary: Get pending and total order counts
      responses:
        "200":
          description: Order counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderCount"

  /orders/bulk-delete:
    post:
      operationId: bulkDeleteOrders
      tags: [orders]
      summary: Delete multiple orders at once
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDeleteInput"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkDeleteResult"

  /orders/{id}:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusInput"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    delete:
      operationId: deleteOrder
      tags: [orders]
      summary: Delete an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── Conversations ──────────────────────────────────────────────────────────
  /conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      summary: List all conversation users (latest message per user)
      responses:
        "200":
          description: List of conversation summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConversationSummary"

  /conversations/{fbUserId}:
    get:
      operationId: getConversation
      tags: [conversations]
      summary: Get full conversation with a user
      parameters:
        - name: fbUserId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Conversation messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConversationMessage"

  /conversations/{fbUserId}/pause:
    patch:
      operationId: pauseConversation
      tags: [conversations]
      summary: Pause AI for a conversation
      parameters:
        - name: fbUserId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: AI paused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PauseResponse"

  /conversations/{fbUserId}/resume:
    patch:
      operationId: resumeConversation
      tags: [conversations]
      summary: Resume AI for a conversation
      parameters:
        - name: fbUserId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: AI resumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PauseResponse"

  /conversations/{fbUserId}/label:
    patch:
      operationId: setConversationLabel
      tags: [conversations]
      summary: Set label for a conversation
      parameters:
        - name: fbUserId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetLabelInput"
      responses:
        "200":
          description: Label updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /conversations/{fbUserId}/sentiment:
    patch:
      operationId: setConversationSentiment
      tags: [conversations]
      summary: Set sentiment for a conversation
      parameters:
        - name: fbUserId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetSentimentInput"
      responses:
        "200":
          description: Sentiment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /conversations/{fbUserId}/reply:
    post:
      operationId: replyToConversation
      tags: [conversations]
      summary: Send admin reply to a conversation via Facebook Messenger
      parameters:
        - name: fbUserId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplyInput"
      responses:
        "200":
          description: Reply sent and saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationMessage"

  /conversations/paused-count:
    get:
      operationId: getPausedConversationCount
      tags: [conversations]
      summary: Get count of paused conversations
      responses:
        "200":
          description: Paused conversation count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PausedCount"

  # ── Comments ───────────────────────────────────────────────────────────────
  /comments:
    get:
      operationId: listComments
      tags: [comments]
      summary: List comment interactions (paginated)
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of comment log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommentLog"

  /comments/stats:
    get:
      operationId: getCommentStats
      tags: [comments]
      summary: Get comment statistics
      responses:
        "200":
          description: Comment stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentStats"

  # ── FB Settings ────────────────────────────────────────────────────────────
  /fb-settings:
    get:
      operationId: getFbSettings
      tags: [fb-settings]
      summary: Get Facebook page settings
      responses:
        "200":
          description: Facebook settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FbSettings"
    post:
      operationId: saveFbSettings
      tags: [fb-settings]
      summary: Save Facebook page settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveFbSettingsInput"
      responses:
        "200":
          description: Saved settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FbSettings"

  /fb-settings/test:
    get:
      operationId: testFbConnection
      tags: [fb-settings]
      summary: Test Facebook connection
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FbTestResult"

  # ── Webhook ────────────────────────────────────────────────────────────────
  /webhook:
    get:
      operationId: verifyWebhook
      tags: [webhook]
      summary: Verify Facebook webhook
      parameters:
        - name: hub.mode
          in: query
          required: false
          schema:
            type: string
        - name: hub.verify_token
          in: query
          required: false
          schema:
            type: string
        - name: hub.challenge
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Challenge value returned on success
          content:
            text/plain:
              schema:
                type: string
    post:
      operationId: handleWebhook
      tags: [webhook]
      summary: Handle incoming Facebook webhook events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Event received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── Appointments ───────────────────────────────────────────────────────────
  /appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: date
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"

  /appointments/count:
    get:
      operationId: getAppointmentCount
      tags: [appointments]
      summary: Get pending appointment count
      responses:
        "200":
          description: Appointment count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentCount"

  /appointments/{id}:
    patch:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update appointment status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAppointmentInput"
      responses:
        "200":
          description: Updated appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
    delete:
      operationId: deleteAppointment
      tags: [appointments]
      summary: Delete appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── Slots ──────────────────────────────────────────────────────────────────
  /slots:
    get:
      operationId: listSlots
      tags: [slots]
      summary: List all time slots
      responses:
        "200":
          description: List of slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AvailableSlot"
    post:
      operationId: createSlot
      tags: [slots]
      summary: Create a new time slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSlotInput"
      responses:
        "201":
          description: Created slot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailableSlot"

  /slots/{id}:
    patch:
      operationId: updateSlot
      tags: [slots]
      summary: Update a slot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSlotInput"
      responses:
        "200":
          description: Updated slot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailableSlot"
    delete:
      operationId: deleteSlot
      tags: [slots]
      summary: Delete a slot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /slots/available:
    get:
      operationId: getAvailableSlots
      tags: [slots]
      summary: Get available slots for a date
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Available slots with booking capacity info
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - $ref: "#/components/schemas/AvailableSlot"
                    - type: object
                      properties:
                        currentBookings:
                          type: integer
                        remainingCapacity:
                          type: integer

  # ── FAQs ───────────────────────────────────────────────────────────────────
  /faqs:
    get:
      operationId: listFaqs
      tags: [faqs]
      summary: List all FAQs
      responses:
        "200":
          description: List of FAQs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Faq"
    post:
      operationId: createFaq
      tags: [faqs]
      summary: Create a FAQ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFaqInput"
      responses:
        "201":
          description: Created FAQ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Faq"

  /faqs/{id}:
    put:
      operationId: updateFaq
      tags: [faqs]
      summary: Update a FAQ
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFaqInput"
      responses:
        "200":
          description: Updated FAQ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Faq"
    delete:
      operationId: deleteFaq
      tags: [faqs]
      summary: Delete a FAQ
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── Broadcasts ────────────────────────────────────────────────────────────
  /broadcasts:
    get:
      operationId: listBroadcasts
      tags: [broadcasts]
      summary: List all broadcasts
      responses:
        "200":
          description: List of broadcasts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Broadcast"
    post:
      operationId: createBroadcast
      tags: [broadcasts]
      summary: Create a new broadcast
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBroadcastInput"
      responses:
        "201":
          description: Created broadcast
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Broadcast"

  /broadcasts/{id}:
    patch:
      operationId: updateBroadcast
      tags: [broadcasts]
      summary: Update a broadcast (title, message, filter, schedule)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBroadcastInput"
      responses:
        "200":
          description: Updated broadcast
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Broadcast"
    delete:
      operationId: deleteBroadcast
      tags: [broadcasts]
      summary: Delete a broadcast
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /broadcasts/{id}/send:
    post:
      operationId: sendBroadcast
      tags: [broadcasts]
      summary: Send a broadcast to active users (within 24h window)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Broadcast sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendBroadcastResult"

  /broadcasts/{id}/stats:
    get:
      operationId: getBroadcastStats
      tags: [broadcasts]
      summary: Get delivery stats for a broadcast
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Broadcast delivery stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BroadcastStats"

  # ── Leads ─────────────────────────────────────────────────────────────────
  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List all captured leads
      parameters:
        - name: label
          in: query
          required: false
          schema:
            type: string
          description: Filter leads by label
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"
    post:
      operationId: createLead
      tags: [leads]
      summary: Manually create a lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadInput"
      responses:
        "201":
          description: Created lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /leads/export:
    get:
      operationId: exportLeads
      tags: [leads]
      summary: Export leads as CSV (with UTF-8 BOM)
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

  /leads/{id}:
    put:
      operationId: updateLead
      tags: [leads]
      summary: Update a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadInput"
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
    delete:
      operationId: deleteLead
      tags: [leads]
      summary: Delete a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── Subscription ──────────────────────────────────────────────────────────
  /subscription:
    get:
      operationId: getSubscription
      tags: [subscription]
      summary: Get current plan and usage (V3 canonical)
      responses:
        "200":
          description: Current subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentSubscription"

  /subscription/plans:
    get:
      operationId: getSubscriptionPlans
      tags: [subscription]
      summary: List all subscription plans (V3 canonical)
      responses:
        "200":
          description: List of plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubscriptionPlan"

  /subscription/upgrade:
    post:
      operationId: upgradeSubscription
      tags: [subscription]
      summary: Upgrade to a new subscription plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSubscriptionPlanInput"
      responses:
        "200":
          description: Plan upgraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpgradePlanResponse"

  /subscription-plans:
    get:
      operationId: listSubscriptionPlans
      tags: [subscription]
      summary: List all subscription plans
      responses:
        "200":
          description: List of plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubscriptionPlan"

  /subscription/current:
    get:
      operationId: getCurrentSubscription
      tags: [subscription]
      summary: Get current plan and usage
      responses:
        "200":
          description: Current subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentSubscription"

  /subscription/usage:
    get:
      operationId: getSubscriptionUsage
      tags: [subscription]
      summary: Get current month usage
      responses:
        "200":
          description: Usage data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionUsage"

  /subscription/plan:
    put:
      operationId: updateSubscriptionPlan
      tags: [subscription]
      summary: Update current subscription plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSubscriptionPlanInput"
      responses:
        "200":
          description: Plan updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpgradePlanResponse"

  # ── Domain Templates ──────────────────────────────────────────────────────
  /domain-templates:
    get:
      operationId: listDomainTemplates
