                  $ref: "#/components/schemas/DomainTemplate"

  /domain-templates/{domain}:
    get:
      operationId: getDomainTemplate
      tags: [domain-templates]
      summary: Get a single domain template
      parameters:
        - name: domain
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Domain template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainTemplate"

  /domain-templates/{domain}/apply:
    post:
      operationId: applyDomainTemplate
      tags: [domain-templates]
      summary: Apply a domain template to AI config, FAQs and products
      parameters:
        - name: domain
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Template applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplyTemplateResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    # ── Auth ────────────────────────────────────────────────────────────────
    LoginInput:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/AuthUser"
      required: [token, user]

    AuthUser:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
      required: [id, username]

    # ── Stats ──────────────────────────────────────────────────────────────
    DashboardStats:
      type: object
      properties:
        sessions:
          type: object
          properties:
            today:
              type: integer
            week:
              type: integer
            month:
              type: integer
        orders:
          type: object
          properties:
            total:
              type: integer
            pending:
              type: integer
        appointments:
          type: object
          properties:
            total:
              type: integer
            pending:
              type: integer
        comments:
          type: object
          properties:
            today:
              type: integer
        revenue:
          type: object
          properties:
            today:
              type: number
            currency:
              type: string
        subscription:
          type: object
          properties:
            sessionsUsed:
              type: integer
            sessionsLimit:
              type: integer
            percentage:
              type: integer
            resetsOn:
              type: string
        peakHours:
          type: array
          items:
            type: object
            properties:
              hour:
                type: integer
              count:
                type: integer
        topProducts:
          type: array
          items:
            type: object
            properties:
              productName:
                type: string
              orderCount:
                type: integer
        sentiment:
          type: object
          properties:
            positive:
              type: integer
            neutral:
              type: integer
            negative:
              type: integer
        trust:
          type: object
          properties:
            conversionRate:
              type: integer
            botOrders:
              type: integer
            errorsPrevented:
              type: integer
            humanInterventions:
              type: integer

    # ── Provider ──────────────────────────────────────────────────────────────
    Provider:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        providerType:
          type: string
        apiKey:
          type: string
          description: Masked key (never returned in full)
        baseUrl:
          type: string
          nullable: true
        modelName:
          type: string
        isActive:
          type: integer
        priority:
          type: integer
          description: Round-robin priority (lower = higher priority)
        isEnabled:
          type: integer
          description: Whether provider participates in load balancing (0 or 1)
        failCount:
          type: integer
          description: Consecutive failure count (resets on success)
        lastUsedAt:
          type: string
          nullable: true
          description: ISO timestamp of last use
        createdAt:
          type: string
      required: [id, name, providerType, modelName, isActive]

    CreateProviderInput:
      type: object
      properties:
        name:
          type: string
        providerType:
          type: string
        apiKey:
          type: string
        baseUrl:
          type: string
          nullable: true
        modelName:
          type: string
      required: [name, providerType, apiKey, modelName]

    UpdateProviderInput:
      type: object
      properties:
        name:
          type: string
        providerType:
          type: string
        apiKey:
          type: string
        baseUrl:
          type: string
          nullable: true
        modelName:
          type: string
        priority:
          type: integer
        isEnabled:
          type: integer

    ProviderTestResult:
      type: object
      properties:
        success:
          type: boolean
        response:
          type: string
        latencyMs:
          type: integer
      required: [success]

    ProviderStat:
      type: object
      properties:
        providerId:
          type: integer
        providerName:
          type: string
        totalCalls:
          type: integer
        successCount:
          type: integer
        successRate:
          type: integer
          description: Success percentage (0-100)
        avgLatencyMs:
          type: integer
      required: [providerId, providerName, totalCalls, successCount, successRate, avgLatencyMs]

    # ── AI Config ─────────────────────────────────────────────────────────────
    AiConfig:
      type: object
      properties:
